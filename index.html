<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife - Health & Wellness Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899;
            --accent: #10b981; --warning: #f59e0b; --bg: #0f172a;
            --bg-light: #1e293b; --card-bg: #1e293b; --text: #f1f5f9;
            --text-dim: #94a3b8; --border: #334155;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        .bg-gradient { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .bg-gradient::before, .bg-gradient::after { content: ''; position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 20s ease-in-out infinite; }
        .bg-gradient::before { width: 600px; height: 600px; background: linear-gradient(135deg, #6366f1, #ec4899); top: -300px; right: -300px; }
        .bg-gradient::after { width: 500px; height: 500px; background: linear-gradient(135deg, #10b981, #6366f1); bottom: -250px; left: -250px; animation-delay: 5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 33% { transform: translate(50px, -50px) rotate(120deg); } 66% { transform: translate(-30px, 30px) rotate(240deg); } }
        .header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 1.25rem 0; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: 'Syne', sans-serif; letter-spacing: -0.5px; }
        .nav { display: flex; gap: 2rem; list-style: none; flex-wrap: wrap; }
        .nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: all 0.3s; cursor: pointer; position: relative; }
        .nav a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #6366f1, #ec4899); transition: width 0.3s; }
        .nav a:hover { color: #fff; }
        .nav a:hover::after { width: 100%; }
        .hero { padding: 6rem 0 5rem; text-align: center; position: relative; }
        .hero h1 { font-size: 4.5rem; font-weight: 800; margin-bottom: 1.5rem; font-family: 'Syne', sans-serif; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; letter-spacing: -2px; }
        .hero p { font-size: 1.4rem; color: var(--text-dim); max-width: 650px; margin: 0 auto 2.5rem; }
        .cta-button { display: inline-block; padding: 1rem 2.5rem; background: linear-gradient(135deg, #6366f1, #ec4899); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 1.1rem; transition: all 0.3s; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4); }
        .section { padding: 5rem 0; }
        .section-header { text-align: center; margin-bottom: 4rem; }
        .section-title { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; font-family: 'Syne', sans-serif; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
        .section-subtitle { font-size: 1.2rem; color: var(--text-dim); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem; }
        .info-card { background: var(--card-bg); border-radius: 24px; padding: 2.5rem; border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .info-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #6366f1, #ec4899); transform: scaleX(0); transition: transform 0.4s; }
        .info-card:hover { transform: translateY(-8px); border-color: #6366f1; box-shadow: 0 20px 50px rgba(99, 102, 241, 0.2); }
        .info-card:hover::before { transform: scaleX(1); }
        .card-icon { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
        .card-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
        .card-description { color: var(--text-dim); margin-bottom: 1.5rem; line-height: 1.8; }
        .card-list { list-style: none; }
        .card-list li { padding: 0.6rem 0; color: var(--text-dim); position: relative; padding-left: 2rem; font-size: 0.95rem; }
        .card-list li::before { content: '→'; position: absolute; left: 0; color: #6366f1; font-weight: 700; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 2.5rem; }
        .game-card { background: var(--card-bg); border-radius: 24px; padding: 3rem; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .game-card::before { content: ''; position: absolute; top: 0; right: 0; width: 300px; height: 300px; background: radial-gradient(circle, rgba(99, 102, 241, 0.1), transparent); border-radius: 50%; transform: translate(50%, -50%); }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(520px, 1fr)); gap: 2.5rem; }
        .tool-card { background: var(--card-bg); border-radius: 24px; padding: 3rem; border: 1px solid var(--border); }
        .tool-header { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem; }
        .tool-icon { font-size: 3rem; }
        .tool-title { font-size: 2rem; font-weight: 700; color: var(--text); }
        .input-wrapper { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
        .text-input { flex: 1; padding: 1rem 1.5rem; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; }
        .text-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn { padding: 1rem 2rem; background: linear-gradient(135deg, #6366f1, #ec4899); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: var(--bg); border: 2px solid var(--border); }
        .btn-secondary:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); }
        .nutrition-result { background: rgba(99, 102, 241, 0.1); border: 2px solid rgba(99, 102, 241, 0.3); border-radius: 16px; padding: 2rem; margin-top: 1.5rem; }
        .result-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text); }
        .nutrition-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
        .nutrition-item { background: var(--bg); padding: 1.5rem; border-radius: 12px; text-align: center; }
        .nutrition-value { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nutrition-label { font-size: 0.9rem; color: var(--text-dim); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 2px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 1rem 1.5rem; border-radius: 12px; margin-top: 1rem; }
        .chat-container { height: 550px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; background: var(--bg); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 3px; }
        .chat-message { max-width: 80%; padding: 1rem 1.5rem; border-radius: 16px; line-height: 1.6; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-message.user { align-self: flex-end; background: linear-gradient(135deg, #6366f1, #ec4899); color: white; }
        .chat-message.bot { align-self: flex-start; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
        .typing { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; width: fit-content; }
        .typing span { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-10px); opacity: 1; } }
        .quick-questions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; }
        .quick-btn { padding: 0.6rem 1.25rem; background: var(--bg); border: 2px solid var(--border); color: var(--text); border-radius: 20px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; }
        .quick-btn:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); transform: translateY(-2px); }
        .progress-bar { background: var(--bg); height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 2.5rem; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #ec4899); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .question-text { font-size: 1.6rem; margin-bottom: 2.5rem; color: var(--text); font-weight: 600; line-height: 1.5; }
        .option-btn { width: 100%; padding: 1.5rem; background: var(--bg); border: 2px solid var(--border); border-radius: 16px; font-size: 1.05rem; text-align: left; cursor: pointer; transition: all 0.3s; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; margin-bottom: 1rem; }
        .option-btn:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); transform: translateX(5px); }
        .option-btn.correct { background: rgba(16, 185, 129, 0.1); border-color: #10b981; color: #10b981; }
        .option-btn.incorrect { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #fca5a5; }
        .explanation-box { margin-top: 2rem; padding: 1.5rem; background: rgba(99, 102, 241, 0.1); border-left: 4px solid #6366f1; border-radius: 12px; animation: slideIn 0.3s ease-out; }
        .score-display { text-align: center; padding: 3rem; }
        .score-emoji { font-size: 5rem; margin-bottom: 1.5rem; }
        .score-value { font-size: 4rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
        .challenge-display { text-align: center; margin: 2rem 0; }
        .challenge-icon { font-size: 5rem; margin-bottom: 1rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .challenge-name { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .challenge-desc { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 2rem; }
        .timer-display { font-size: 4rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 2rem 0; }
        .reps-counter { display: flex; align-items: center; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .rep-display { font-size: 3.5rem; font-weight: 800; color: var(--text); }
        .rep-btn { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #ec4899); border: none; color: white; font-size: 2rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .rep-btn:hover { transform: scale(1.1); }
        .rep-btn:active { transform: scale(0.95); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .stat-box { background: var(--bg); padding: 1.5rem; border-radius: 16px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #6366f1; }
        .stat-label { font-size: 0.875rem; color: var(--text-dim); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* YouTube Video Section */
        .videos-section { padding: 5rem 0; background: rgba(30, 41, 59, 0.4); }
        .video-tabs { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; flex-wrap: wrap; }
        .video-tab { padding: 0.75rem 1.75rem; background: var(--card-bg); border: 2px solid var(--border); border-radius: 25px; cursor: pointer; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); transition: all 0.3s; font-size: 0.95rem; }
        .video-tab.active { background: linear-gradient(135deg, #6366f1, #ec4899); border-color: transparent; color: white; }
        .video-tab:hover:not(.active) { border-color: #6366f1; transform: translateY(-2px); }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        .video-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: all 0.4s; cursor: pointer; }
        .video-card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(99, 102, 241, 0.2); border-color: #6366f1; }
        .video-thumbnail { position: relative; width: 100%; padding-top: 56.25%; overflow: hidden; }
        .video-thumbnail img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .video-card:hover .video-thumbnail img { transform: scale(1.05); }
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(99, 102, 241, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.3s; }
        .video-card:hover .play-overlay { background: linear-gradient(135deg, #6366f1, #ec4899); transform: translate(-50%, -50%) scale(1.1); }
        .video-duration { position: absolute; bottom: 0.75rem; right: 0.75rem; background: rgba(0,0,0,0.8); color: white; padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .video-category-badge { position: absolute; top: 0.75rem; left: 0.75rem; padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .video-info { padding: 1.5rem; }
        .video-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; line-height: 1.4; }
        .video-meta { display: flex; justify-content: space-between; align-items: center; }
        .video-channel { font-size: 0.875rem; color: var(--text-dim); font-weight: 600; }
        .video-views { font-size: 0.8rem; color: var(--text-dim); }
        .video-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .video-modal-content { width: 100%; max-width: 900px; background: var(--card-bg); border-radius: 20px; overflow: hidden; }
        .video-modal-header { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .video-modal-title { font-size: 1.2rem; font-weight: 700; color: var(--text); }
        .close-btn { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; padding: 0.5rem; border-radius: 8px; transition: all 0.3s; }
        .close-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }
        .video-iframe-wrapper { position: relative; padding-top: 56.25%; }
        .video-iframe-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Footer */
        .footer { background: var(--card-bg); border-top: 1px solid var(--border); padding: 3rem 0; margin-top: 5rem; text-align: center; }
        .footer p { color: var(--text-dim); }

        /* Hamburger button */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 0.5rem; z-index: 200; }
        .hamburger span { display: block; width: 26px; height: 3px; background: var(--text); border-radius: 3px; transition: all 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        /* Sidebar overlay */
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; backdrop-filter: blur(4px); }
        .sidebar-overlay.open { display: block; }
        /* Sidebar drawer */
        .sidebar { position: fixed; top: 0; left: -320px; width: 280px; height: 100vh; background: #0f172a; border-right: 1px solid var(--border); z-index: 160; transition: left 0.35s cubic-bezier(0.4,0,0.2,1); padding: 0; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 1.75rem; border-bottom: 1px solid var(--border); background: rgba(30,41,59,0.8); }
        .sidebar-logo { font-size: 1.75rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: 'Syne', sans-serif; }
        .sidebar-close { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; line-height: 1; }
        .sidebar-nav { list-style: none; padding: 1.5rem 0; flex: 1; overflow-y: auto; }
        .sidebar-nav li a { display: flex; align-items: center; gap: 0.9rem; padding: 1rem 1.75rem; color: var(--text); text-decoration: none; font-weight: 600; font-size: 1.05rem; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-nav li a:hover { background: rgba(99,102,241,0.12); border-left-color: #6366f1; color: #fff; }
        .sidebar-footer { padding: 1.25rem 1.75rem; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.8rem; text-align: center; }
        @media (max-width: 1024px) { .tools-grid, .games-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .nav { display: none; }
            .hamburger { display: flex; }
            .cards-grid { grid-template-columns: 1fr; }
            .nutrition-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 2.25rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .videos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div id="root"></div>
    <script>
        if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }
        window.addEventListener('load', function() { window.scrollTo(0, 0); });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [sidebarOpen, setSidebarOpen] = React.useState(false);
            const navItems = [
                { label: '💡 Health Tips', id: 'awareness' },
                { label: '🎬 Videos', id: 'ytvideos' },
                { label: '🏋️ Workouts', id: 'videos' },
                { label: '💪 Exercises', id: 'exercises' },
                { label: '🎮 Games', id: 'games' },
                { label: '🎯 Challenge', id: 'challenge' },
                { label: '🛠️ Tools', id: 'tools' },
            ];
            const handleNav = (id) => { setSidebarOpen(false); setTimeout(() => scrollTo(id), 50); };
            return (
                <>
                    <div className={"sidebar-overlay " + (sidebarOpen ? 'open' : '')} onClick={() => setSidebarOpen(false)} />
                    <div className={"sidebar " + (sidebarOpen ? 'open' : '')}>
                        <div className="sidebar-header">
                            <span className="sidebar-logo">FitLife</span>
                            <button className="sidebar-close" onClick={() => setSidebarOpen(false)}>✕</button>
                        </div>
                        <ul className="sidebar-nav">
                            {navItems.map(item => (
                                <li key={item.id}><a onClick={() => handleNav(item.id)}>{item.label}</a></li>
                            ))}
                        </ul>
                        <div className="sidebar-footer">© 2026 FitLife — Health & Wellness</div>
                    </div>

                    <header className="header">
                        <div className="container">
                            <div className="header-content">
                                <div className="logo">FitLife</div>
                                <ul className="nav">
                                    {navItems.map(item => (
                                        <li key={item.id}><a onClick={() => scrollTo(item.id)}>{item.label.replace(/^[^ ]+ /, '')}</a></li>
                                    ))}
                                </ul>
                                <button className={"hamburger " + (sidebarOpen ? 'open' : '')} onClick={() => setSidebarOpen(!sidebarOpen)} aria-label="Menu">
                                    <span></span><span></span><span></span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="hero">
                        <div className="container">
                            <h1>Transform Your Health Journey</h1>

                { q: "How much water should you drink daily?", opts: ["2 glasses","4 glasses","8 glasses","12 glasses"], correct: 2, exp: "About 8 glasses (64 oz) daily, varying by activity and climate." },
                { q: "Recommended weekly exercise time?", opts: ["30 minutes","75 minutes","150 minutes","300 minutes"], correct: 2, exp: "At least 150 minutes of moderate aerobic activity per week." },
                { q: "Essential nutrient for muscle building?", opts: ["Carbohydrates","Protein","Fat","Fiber"], correct: 1, exp: "Protein provides amino acids for muscle building and repair." },
                { q: "Healthy resting heart rate for adults?", opts: ["40-50 bpm","60-100 bpm","110-130 bpm","140-160 bpm"], correct: 1, exp: "Normal resting heart rate ranges from 60-100 beats per minute." },
                { q: "How often to break from sitting?", opts: ["Every 10 min","Every 30 min","Every 2 hours","Once daily"], correct: 1, exp: "Take breaks every 30 minutes to reduce health risks of sitting." },

                { icon: '💪', name: 'Push-ups', desc: 'Complete 15 push-ups', target: 15, timed: false },

                </div></div>

        function MythsVsFacts() {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [answered, setAnswered] = useState(false);
            const [userAnswer, setUserAnswer] = useState(null);
            const [finished, setFinished] = useState(false);
            const statements = [
                { text:"Drinking hot water after meals helps digest food faster", truth:false, explanation:"❌ MYTH: Water temperature doesn't significantly affect digestion. Your body adjusts water to body temperature." },
                { text:"Eating ghee in moderation is healthy for Indians", truth:true, explanation:"✅ FACT: Ghee in moderation (1-2 tsp/day) provides healthy fats, vitamins A, E, K, and butyric acid for gut health." },
                { text:"Rice makes you gain weight and should be avoided", truth:false, explanation:"❌ MYTH: Rice itself doesn't cause weight gain - excess calories do! Portion control matters more than avoiding rice completely." },
                { text:"Turmeric milk (haldi doodh) has anti-inflammatory benefits", truth:true, explanation:"✅ FACT: Turmeric contains curcumin, a powerful anti-inflammatory compound. It aids immunity and reduces inflammation." },
                { text:"Drinking water while standing damages kidneys", truth:false, explanation:"❌ MYTH: Your kidneys work the same whether you stand or sit. Sitting may help you drink slower but doesn't affect kidney health." },
                { text:"Sprouted moong dal is more nutritious than regular moong dal", truth:true, explanation:"✅ FACT: Sprouting increases vitamin C, B vitamins, and makes protein more digestible with more enzymes and antioxidants." },
                { text:"Jaggery (gur) is much healthier than sugar", truth:false, explanation:"❌ MYTH: Jaggery has slightly more minerals than sugar, but both are high in calories and raise blood sugar similarly." },
                { text:"Indian spices like cumin, coriander aid digestion", truth:true, explanation:"✅ FACT: Jeera stimulates digestive enzymes, dhania has fiber and anti-bloating properties. Use them daily!" },
                { text:"Eating papaya during pregnancy can cause miscarriage", truth:false, explanation:"❌ MYTH: Ripe papaya is safe during pregnancy. Only unripe/semi-ripe papaya contains latex that may trigger contractions." },
                { text:"Walking 10,000 steps daily improves overall health", truth:true, explanation:"✅ FACT: 10,000 steps helps cardiovascular health, weight management, reduces diabetes risk, and improves mental health." },
                { text:"Brown bread is always healthier than white bread", truth:false, explanation:"❌ MYTH: Many brown breads are just white bread with caramel coloring! Check labels for 'whole wheat' as first ingredient." },
                { text:"Practicing yoga regularly reduces stress and anxiety", truth:true, explanation:"✅ FACT: Yoga combines postures, breathing, and meditation - scientifically proven to lower cortisol (stress hormone)." },
            ];
            const handleAnswer = (answer) => {
                if (answered) return;
                setAnswered(true); setUserAnswer(answer);
                if (answer===statements[currentQ].truth) setScore(score+1);
                setTimeout(()=>{ if (currentQ<statements.length-1) { setCurrentQ(currentQ+1); setAnswered(false); setUserAnswer(null); } else setFinished(true); }, 3500);
            };
            const restart = () => { setCurrentQ(0); setScore(0); setAnswered(false); setUserAnswer(null); setFinished(false); };
            if (finished) {
                const percent=(score/statements.length)*100;
                return (
                    <div className="game-card"><div className="score-display">
                        <div className="score-emoji">{percent>=75?'🎓':percent>=50?'📚':'💡'}</div>
                        <h2 style={{fontSize:'2rem',marginBottom:'1rem'}}>Game Complete!</h2>
                        <div className="score-value">{score}/{statements.length}</div>
                        <p style={{color:'var(--text-dim)',fontSize:'1.2rem',marginBottom:'2rem'}}>{percent>=80?"Amazing! You can spot health myths easily!":percent>=60?"Good job! You know your health facts!":"Keep exploring! Learning never stops!"}</p>
                        <button className="btn" onClick={restart}>Play Again</button>
                    </div></div>
                );
            }
            const current=statements[currentQ];
            const isCorrect=answered&&userAnswer===current.truth;
            return (
                <div className="game-card">
                    <div className="tool-header"><div className="tool-icon">🇮🇳</div><h3 className="tool-title">Indian Health: Myth vs Fact</h3></div>
                    <div style={{marginBottom:'2rem'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'1rem'}}>
                            <span style={{color:'var(--text-dim)',fontWeight:'600'}}>Question {currentQ+1}/{statements.length}</span>

            const track = () => {
                if (!food.trim()) return;
                setLoading(true); setError(null); setResult(null);
                setTimeout(() => {
                    const lowerFood = food.toLowerCase().trim();
                    let nutrition = nutritionDB[lowerFood];
                    if (!nutrition) {
                        for (const [key, val] of Object.entries(nutritionDB)) {
                            if (lowerFood.includes(key) || key.includes(lowerFood)) { nutrition = val; break; }
                        }
                    }
                    if (!nutrition) {
                        const words = lowerFood.split(' ').filter(w=>w.length>3);
                        for (const word of words) {
                            for (const [key, val] of Object.entries(nutritionDB)) {
                                if (key.includes(word) || word.includes(key)) { nutrition = val; break; }
                            }
                            if (nutrition) break;
                        }
                    }
                    if (nutrition) { setResult(nutrition); setLog(prev=>[...prev, nutrition]); }
                    else setError(`Couldn't find "${food}". Try: chapati, dal, paneer, chicken, idli, biryani, poha, samosa, or other foods.`);
                    setLoading(false);
                }, 400);
            };

            const totalCalories = log.reduce((sum, item) => sum + item.calories, 0);

                <div className="tool-card">

                        </div>

                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>

                                    {showLog?'Hide':'Show'} Today's Log ({log.length} items)
                                </button>
                                <span style={{color:'#10b981',fontWeight:'700',fontSize:'1.1rem'}}>Total: {totalCalories} kcal</span>
                            </div>
                            {showLog&&(
                                <div style={{background:'var(--bg)',borderRadius:'12px',padding:'1rem',maxHeight:'200px',overflowY:'auto'}}>

            const healthAnswers = {
                // ── INDIAN DIET & FOODS ──
                'chapati': 'Chapati (roti) is a healthy whole wheat flatbread. Nutritional highlights per chapati: ~104 calories, 3g protein, 18g carbs, 2.4g fat. Benefits: Good source of complex carbs and fiber, low in fat, no sugar. Pair with protein-rich dal and vegetables. Whole wheat chapati is far better than refined flour options. For weight loss, limit to 2-3 rotis per meal.',
                'dal': 'Dal is the backbone of Indian nutrition! Types and benefits: Moong dal (easiest to digest, great for weight loss), Masoor dal (highest protein, iron-rich), Toor dal (most commonly used, balanced nutrition), Urad dal (high protein, great for idli/dosa), Chana dal (slowest digesting, best for diabetics). All dals are excellent plant protein sources (12-18g per cup). Cook with minimal oil, add tomatoes and greens for extra nutrition.',
                'indian diet': 'The traditional Indian diet is one of the world\'s healthiest! Best aspects: Dal-roti combination provides complete protein (complementary amino acids). Spices like turmeric, cumin, ginger have proven health benefits. Fermented foods (idli, dosa, curd) provide probiotics. Seasonal eating aligns with Ayurvedic principles. What to focus on: whole wheat roti > maida, brown rice > white rice (sometimes), dal every meal, seasonal vegetables, curd/buttermilk. What to limit: deep fried snacks, excess ghee, refined flour, packaged sweets.',
                'paneer': 'Paneer (Indian cottage cheese) is an excellent vegetarian protein. Per 100g: 265 calories, 18g protein, 20g fat. Key benefits: Complete protein with all essential amino acids, excellent calcium for bone health, slow-digesting casein protein ideal for muscle building, versatile in cooking. Tip: Low-fat paneer has 186 calories and 18g protein – great for weight management. Grilled/bhuna paneer is healthiest. Paneer tikka > paneer pakora for nutrition.',
                'ghee': 'Ghee is a nutritional powerhouse when used in moderation! Per tablespoon: 112 calories, 13g fat. Benefits: Contains butyric acid (anti-inflammatory, gut health), vitamins A, D, E, K (fat-soluble), higher smoke point than most oils (good for Indian cooking), aids in absorption of fat-soluble nutrients from food. Recommended: 1-2 teaspoons daily. Add to dal, roti, khichdi. Avoid if high cholesterol. Ghee from grass-fed cows is best quality.',
                'roti vs rice': 'Both can be healthy! Chapati (per roti): 104 cal, 3g protein, 18g carbs, 2.4g fat, higher fiber, more filling, slower digestion. White Rice (per cup cooked): 205 cal, 4g protein, 45g carbs, minimal fiber. Winner for weight loss: Roti. Winner for athletes needing quick energy: Rice. Best approach: Eat both in appropriate portions. 2 rotis + 1/2 cup rice is balanced. Brown rice is a great middle ground. In South India, rice is a staple and people are generally healthy – total diet matters more than rice vs roti debate.',
                'poha': 'Poha (flattened/beaten rice) is one of India\'s healthiest breakfast options! Per cup (150g): 180 calories, 4g protein, 35g carbs, 3g fat. Benefits: Easy to digest (ideal breakfast), low in calories, adds vegetables (onion, tomatoes, peas), can be enriched with iron, quick to make. For best nutrition: Use thick poha, add lots of vegetables, squeeze lemon for vitamin C (helps iron absorption), add curry leaves for B vitamins. Avoid: Adding excess oil, deep frying extras.',
                'sprouts': 'Sprouts are nutritional superstars! Benefits over regular legumes: Vitamin C increases 6-12x during sprouting, protein becomes 20-30% more digestible, B vitamins (B1, B2, B3) increase significantly, reduces antinutrients (phytates) that block mineral absorption, natural enzymes aid digestion. Best sprouts: Moong sprouts (most popular), chana sprouts (high protein), methi sprouts (blood sugar control), wheat sprouts (rich in wheat germ). How to eat: Raw in salad, lightly stir-fried, in chaats. Per cup: 78-85 calories with 6g protein.',
                'idli dosa': 'Idli and dosa are among the world\'s healthiest breakfast foods! Idli per 2 pieces: 156 calories, 4.8g protein, 30g carbs – steamed, zero oil, fermented (probiotic), easy to digest, complete meal with sambhar. Dosa: 168 cal for plain, more calories for masala/fried versions. Fermentation benefits: Increases B vitamins, makes protein more bioavailable, creates beneficial bacteria, reduces phytic acid. Best pairings: Idli + sambhar (complete meal), dosa + coconut chutney (healthy fats + protein). Tip: Avoid deep-fried variations – steamed idli wins every time.',
                'biryani': 'Biryani can be enjoyed in moderation as part of a balanced diet! Chicken biryani per cup (250g): 375 calories, 18g protein, 48g carbs, 12g fat. Tips to make healthier: Use brown rice instead of white, reduce oil/ghee used, add more vegetables, use low-fat yogurt in marinade, bake instead of dum cook with heavy oil base. Chicken biryani is better than mutton (425 cal) for calorie-conscious choices. Frequency: 1-2 times per week is reasonable. Pair with raita (probiotics) and salad to balance the meal.',
                'samosa': 'Each samosa is ~153 calories with 8g fat from deep frying. Better alternatives: Baked samosa (95 cal), tandoori samosa (100 cal), mini samosas as snack. Tips: If eating regular samosa, skip chutney (adds 40-50 calories), have only 1-2, pair with green tea. Make at home: Use less oil, bake instead of fry, add more vegetables. The filling (aloo, peas) is nutritious – the frying is the problem.',
                'makhana': 'Roasted makhana (fox nuts/lotus seeds) is one of India\'s best healthy snacks! Per cup (32g): 111 calories, 3.9g protein, 20g carbs, 0.5g fat. Benefits: Low in calories and fat, good source of magnesium, potassium, phosphorus, antioxidant-rich (preventing aging), anti-inflammatory properties, good for bone health. How to prepare: Dry roast in ghee (1 tsp) with salt and spices – perfect evening snack. Beats chips (152 cal, 10g fat) by a mile!',
                'coconut water': 'Coconut water is nature\'s sports drink! Per glass (240ml): 46 calories, 9g natural sugars, electrolytes (potassium: 600mg, magnesium, sodium). Benefits: Rehydrates better than water after light exercise, natural electrolyte balance, low in calories, cytokinins have anti-aging properties, aids digestion. Best time: Post-workout, morning on empty stomach, in summer heat. Limitation: Not suitable for very intense exercise (needs higher sodium/carb replacement). Tender coconut is best, packaged versions may have added sugars.',
                'turmeric': 'Turmeric (haldi) is India\'s golden medicine! Active compound: Curcumin. Benefits proven by research: Powerful anti-inflammatory (comparable to some medications), antioxidant that neutralises free radicals, may improve brain function (BDNF levels), reduces heart disease risk, may help prevent cancer, anti-depressant properties. Best ways to use: Golden milk (haldi doodh) with black pepper, add to curries, dal, rice. Important: Combine with black pepper (piperine) – increases curcumin absorption by 2000%. Standard dose: 1/2-1 tsp daily.',
                'indian spices': 'Indian spices are functional foods with medicinal properties!\n\n🌿 Turmeric (Haldi): Anti-inflammatory, antioxidant, brain health\n🌿 Cumin (Jeera): Digestive enzyme stimulation, iron source, antioxidant\n🌿 Coriander (Dhania): Anti-bloating, blood sugar control, liver health\n🌿 Ginger (Adrak): Anti-nausea, anti-inflammatory, circulation\n🌿 Cinnamon (Dalchini): Blood sugar control, heart health, anti-microbial\n🌿 Cardamom (Elaichi): Digestive health, breath freshener, anti-spasmodic\n🌿 Fenugreek (Methi): Blood sugar regulation, testosterone boost, milk production\n🌿 Asafoetida (Hing): Powerful digestive aid, reduces bloating, flatulence\n🌿 Black Pepper: Enhances nutrient absorption (especially curcumin), digestive stimulant\n\nUse these generously in cooking – they\'re free medicine!',
                'vegetarian protein india': 'Complete guide to vegetarian protein in India!\n\n💪 High-protein foods:\n- Soya chunks: 52g protein per 100g dry (HIGHEST among vegetarian foods!)\n- Paneer: 18g per 100g\n- Moong/Masoor dal: 14-18g per cup cooked\n- Chickpeas/Rajma: 15g per cup\n- Greek yogurt: 17g per cup\n- Sattu (roasted chana flour): 20g per 100g\n- Quinoa: 8g per cup cooked\n\n🍽️ Daily protein goal: 0.8-1g per kg body weight\n✅ Strategy: Eat dal + roti/rice (complementary proteins), add dahi daily, snack on makhana/nuts, consider soya chunks in curries for huge protein boost.',
                'sattu': 'Sattu (roasted Bengal gram/chana flour) is an underrated superfood! Per 100g: 413 calories, 20g protein, 65g carbs, 6g fat. Benefits: High protein (best plant protein per gram), excellent fiber for digestion, low glycemic index, cooling effect on body, economical and widely available. Uses: Sattu sherbet (cold drink), paratha stuffing, sattu ladoo. Popular in Bihar/UP/Bengal. Excellent for athletes, manual labourers, summer heat. Mix with water, lemon, and salt for a protein drink.',
                'chai': 'Masala chai in moderation is actually healthy! Benefits: Black tea polyphenols (antioxidants), ginger and cardamom aid digestion, warming effect on body, small amounts of caffeine for alertness. Nutritional facts (without sugar): 65 calories, 3g protein. With sugar: 95 calories. Tips: Use less sugar or try jaggery, avoid 4+ cups daily (caffeine), don\'t drink on empty stomach, use less milk for fewer calories. Chai is part of Indian culture – enjoy 1-2 cups daily guilt-free!',
                'pranic food': '🌿 Pranic Food Classification (Yogic/Ayurvedic system)\n\nPrana = life force energy. Foods are classified by how they affect your energy and consciousness.\n\n✅ HIGH PRANIC FOODS (Sattvic - promote clarity, vitality):\n🌿 Fresh fruits: mango, banana, apple, papaya, pomegranate\n🌿 Vegetables: spinach, carrot, cucumber, tomato, broccoli\n🌿 Whole grains: brown rice, whole wheat roti, oats, daliya\n🌿 Legumes: moong dal, chana, rajma (freshly cooked)\n🌿 Dairy: fresh milk, dahi, paneer, ghee, buttermilk\n🌿 Nuts & seeds: almonds, walnuts, flaxseed, chia seeds\n🌿 Natural sweeteners: honey, jaggery, dates\n🌿 Mild spices: turmeric, cumin, coriander, ginger, cinnamon\n🌿 Fresh coconut water, herbal teas\n\n⚠️ LOW PRANIC / RAJASIC FOODS (stimulating, agitating energy):\n⚠️ Excessive spices, chillies, very hot/pungent food\n⚠️ Coffee, strong tea, energy drinks\n⚠️ Sour foods in excess, pickles, vinegar\n⚠️ Packaged/processed but not harmful (chips, namkeen)\n⚠️ Deep-fried foods (pakora, vada, puri)\n⚠️ White refined flour (maida) products\n\n🔴 NON-PRANIC / TAMASIC FOODS (dull energy, heaviness):\n🔴 Meat, fish, poultry, eggs (in yogic classification)\n🔴 Onion and garlic (traditional yogic diet avoids these)\n🔴 Mushrooms (grown in darkness, tamasic)\n🔴 Alcohol and intoxicants\n🔴 Stale, reheated, or leftover food\n🔴 Overly processed/packaged foods\n🔴 Frozen foods, canned goods\n\n💡 Note: The pranic classification is from yogic tradition. For general nutrition, onion/garlic/eggs are healthy. Choose based on your goals – yoga practitioners typically prefer sattvic diet.',
                'sattvic food': '✅ Sattvic (High Pranic) Diet Guide!\n\nSattvic diet is the yogic diet for clarity, peace, and high energy.\n\n🌿 Best Sattvic Indian meals:\n- Khichdi (rice + moong dal + mild spices)\n- Fresh fruit breakfast\n- Roti + palak paneer + cucumber raita\n- Sprouts salad with lemon\n- Poha with nuts and coconut\n- Steamed idli + coconut chutney\n- Sabudana khichdi\n- Daliya porridge with fruits\n- Warm milk with turmeric and honey\n\n🌿 Core principles:\n1. Freshly cooked (no reheated food)\n2. Mild spices (no excessive chilli)\n3. No onion, garlic (traditional rule)\n4. No meat/eggs\n5. Eat with gratitude and awareness\n6. Don\'t overeat (eat to 80% capacity)\n\n💫 Benefits practitioners report: Clearer mind, better focus during meditation, stable energy (no spikes), improved mood, lighter feeling after meals, deeper sleep.\n\nMany yogis, sadhus, and spiritual practitioners follow this diet. It is widely practiced across Indian ashrams.',
                'tamasic food': '🔴 Tamasic (Non-Pranic) Foods to Avoid!\n\nIn yogic philosophy, tamasic foods create dullness, lethargy, and cloud the mind.\n\n🔴 Common tamasic foods:\n- Meat, fish, chicken, eggs\n- Onion and garlic\n- Mushrooms\n- Alcohol, tobacco\n- Stale or leftover food (even reheated)\n- Deep-fried foods\n- Refined flour (maida) products\n- Excessive sugar\n- Frozen and canned foods\n- Overripe or rotten food\n\n⚡ Effects yogic tradition attributes to tamasic food:\n- Mental dullness and heaviness\n- Decreased motivation\n- Disrupted sleep\n- Reduced awareness in meditation\n- Emotional instability\n\n💡 Modern nutrition note: Many tamasic foods (like eggs, fish, garlic, onion) are nutritionally excellent! The tamasic classification is from a spiritual/energetic perspective, not a health deficiency perspective. Athletes and non-practitioners benefit greatly from these foods. Yogis following strict sattvic diet for spiritual practice choose to avoid them for that reason.',
                'non pranic': '🔴 Non-Pranic Foods in Indian Diet\n\nFrom the yogic/Ayurvedic perspective, these foods are considered non-pranic or tamasic:\n\n🥩 Animal Products (in yogic classification):\n- Chicken, mutton, beef, pork\n- Fish and seafood\n- Eggs (though lacto-vegetarian diets may include dairy)\n\n🧅 Pungent Vegetables:\n- Onion and garlic (surprisingly, avoided in strict yogic diet)\n- Leeks and shallots\n\n🍄 Fungi: Mushrooms (grown without sunlight)\n\n🏭 Processed & Stale:\n- Deep-fried snacks (pakora, samosa, chips)\n- Reheated or day-old food\n- Packaged/canned foods\n- Refined flour (maida) products\n- Excessive pickles, vinegar\n\n🥃 Intoxicants: Alcohol, tobacco\n\n💡 Remember: This is yogic classification. From a pure nutrition standpoint, garlic, onion, eggs are among the HEALTHIEST foods. The classification is about vibrational energy, not vitamins!',
                'jaggery vs sugar': 'Jaggery (gur) vs Sugar – The real truth! Similarities: Both are 99%+ sugar, similar calorie content (~4 cal/g), both raise blood sugar similarly. Jaggery advantages: Contains small amounts of iron, potassium, magnesium, antioxidants, less refined, molasses retained. The verdict: Jaggery is marginally better than white sugar, but neither should be consumed in large amounts. If choosing a sweetener: Jaggery > refined sugar, but dates/honey/coconut sugar are better options. A diabetic shouldn\'t freely eat jaggery thinking it\'s healthy!',
                'curd rice': 'Curd rice (thayir sadam) is one of the healthiest complete meals! Per cup: 268 calories, 7g protein, 45g carbs, 6g fat. Benefits: Probiotics from curd (gut health, immunity), carbs from rice (energy), tempering spices (digestive benefits), cooling on the body. Great for: Digestive recovery, hot summer days, soothing upset stomach, post-illness recovery. Add: Pomegranate, grated carrot, cucumber for extra nutrition. This South Indian staple is Ayurvedically perfect – cooling, soothing, and nourishing!',
                'rajma':  'Rajma (kidney beans) is one of India\'s best protein and fiber foods! Per cup cooked: 225 calories, 15g protein, 40g carbs, 0.9g fat. Benefits: High fiber reduces cholesterol and blood sugar, excellent plant protein, iron and folate for blood health, antioxidant-rich (anthocyanins in red color), prebiotic fiber feeds gut bacteria. Rajma chawal is actually a nutritionally complete meal! Tips: Soak overnight, pressure cook, pair with brown rice, add lemon for iron absorption, don\'t overcook (destroys nutrients).',

                // ── EXERCISE & WORKOUTS ──
                'surya namaskar': 'Surya Namaskar (Sun Salutation) is the most complete exercise in yoga! 12 poses in one flow. Benefits: Full body workout (stretches 97% of muscles), improves flexibility, builds strength, aids weight loss (1 round = ~3.5 calories burned), improves circulation, reduces stress cortisol, regulates hormones. For weight loss: 12 rounds daily burns ~200 calories. Best time: Early morning, facing east, empty stomach. For beginners: Start with 3-4 rounds, build to 12. Each round takes about 1 minute at medium pace.',
                'yoga for beginners': 'Starting yoga? Here\'s your beginner guide!\n\n🧘 Essential beginner poses:\n- Mountain Pose (Tadasana): Foundation of all standing poses\n- Child\'s Pose (Balasana): Rest position, back stretch\n- Cat-Cow Stretch: Spinal mobility\n- Downward Dog (Adho Mukha): Full body stretch\n- Warrior I & II: Leg strength + hip flexibility\n- Tree Pose (Vrikshasana): Balance\n- Bridge Pose (Setu Bandhasana): Back strength, hip flexors\n- Corpse Pose (Shavasana): Relaxation, meditation\n\n⏱️ Start with 20-30 minutes, 3x/week. Use a mat, wear comfortable clothes. Follow YouTube videos (Yoga with Adriene is excellent for beginners).',
                'yoga benefits': 'Yoga offers 360-degree health benefits!\n\n🔬 Scientifically proven benefits:\n- Reduces cortisol (stress hormone) by up to 25%\n- Lowers blood pressure by 5-10 points\n- Improves flexibility by 35% in 8 weeks\n- Reduces chronic lower back pain\n- Improves sleep quality (15-20% improvement)\n- Reduces anxiety and depression symptoms\n- Enhances immune function\n- Improves balance in older adults (reduces fall risk)\n- May reduce inflammation markers (CRP)\n\nBest styles for different goals: Vinyasa (cardio + flexibility), Hatha (balance + relaxation), Yin Yoga (deep flexibility, meditation), Power Yoga (strength + cardio), Restorative (stress relief, injury recovery).',
                'pranayama': 'Pranayama (yogic breathing) is powerful medicine! Key types:\n\n🌬️ Anulom Vilom (Alternate Nostril Breathing): Balances nervous system, reduces anxiety, improves lung capacity. 5-10 minutes daily.\n🌬️ Kapalabhati (Skull Shining Breath): Cleansing, energizing, aids digestion, strengthens diaphragm. Start with 30 strokes/minute.\n🌬️ Bhramari (Humming Bee Breath): Instant stress relief, reduces blood pressure, helps sleep.\n🌬️ Bhastrika (Bellows Breath): Energizing, clears lungs, improves circulation.\n🌬️ Ujjayi (Ocean Breath): Calming, used in yoga practice.\n\nBest time: Early morning, empty stomach. Start with 5-10 minutes and gradually increase.',
                'running': 'Running is one of the best all-around exercises!\n\n🏃 Benefits: Burns 400-600 calories/hour, improves heart health, releases endorphins (natural mood booster), builds leg and core strength, improves bone density, increases longevity.\n\n📋 Beginner plan (Couch to 5K):\n- Week 1-2: Walk 5min, jog 1min, repeat 5x\n- Week 3-4: Walk 3min, jog 3min, repeat 5x\n- Week 5-6: Jog 10min, walk 2min, jog 10min\n- Week 7-8: Continuous jog for 20-30min\n\n💡 Tips: Proper shoes are ESSENTIAL (worth the investment), run on softer surfaces (tracks/grass) initially, warm up/cool down, stay hydrated, avoid inclines initially.',
                'push ups': 'Push-ups are the perfect bodyweight exercise! They work chest, shoulders, triceps, and core simultaneously.\n\n📊 Muscle activation: Chest (pectoralis major) 55%, Triceps 25%, Shoulders 15%, Core 5%\n\n🔢 Variations by difficulty:\n- Wall push-ups (easiest, beginners)\n- Incline push-ups (on table/bench)\n- Standard push-ups\n- Wide grip (more chest emphasis)\n- Diamond push-ups (more triceps)\n- Decline push-ups (upper chest)\n- Archer push-ups\n- One-arm push-up (hardest)\n\n🎯 Goal: Build to 50 consecutive standard push-ups. This indicates good upper body strength. Start with 5-10, add 1-2 daily.',
                'squats': 'Squats are the king of lower body exercises! Muscles worked: Quadriceps (primary), glutes, hamstrings, calves, core.\n\n✅ Perfect squat form:\n1. Feet shoulder-width apart, toes slightly out\n2. Chest up, core tight, look forward\n3. Push hips back and bend knees simultaneously\n4. Thighs parallel to floor (or lower if flexible)\n5. Drive through heels to stand up\n6. Don\'t let knees cave inward\n\n💪 Variations: Bodyweight squat → Goblet squat → Barbell back squat → Front squat → Single-leg squat. Aim for 100 bodyweight squats daily as a fitness benchmark.',
                'hiit': 'HIIT (High-Intensity Interval Training) is the most time-efficient workout!\n\n⚡ How it works: Alternate between maximum effort (80-90% max heart rate) and rest/low intensity.\n\n📊 Proven benefits: Burns 25-30% more calories than steady-state cardio, EPOC effect (burns calories for 24-48hrs after), improves insulin sensitivity, increases VO2 max quickly, preserves muscle mass while losing fat.\n\n⏱️ Sample 15-min HIIT:\n- Jumping jacks: 30 sec on, 15 sec rest\n- Burpees: 30 sec on, 15 sec rest\n- High knees: 30 sec on, 15 sec rest\n- Mountain climbers: 30 sec on, 15 sec rest\n- Repeat 3-4 times\n\nDo 2-3 times per week, not daily (recovery needed!).',
                'weight loss india': 'Practical weight loss tips for Indians!\n\n✅ DO:\n- 2 rotis instead of 4, fill half plate with sabzi\n- Dal every meal (protein = satiety)\n- Walk 30-45 min daily (10,000 steps goal)\n- Eat more karela, lauki, tinda, spinach\n- Drink nimbu pani instead of chai with sugar\n- Sleep 7-9 hours (poor sleep = weight gain hormones)\n- Eat slowly, chew 20-30 times per bite\n- Have fruits as snacks, not sweets\n\n❌ AVOID:\n- Deep fried snacks daily (samosa, pakora, chips)\n- White rice in large portions\n- Sweets after every meal\n- Packaged namkeen, biscuits\n- Fruit juices (eat whole fruit instead)\n- Late-night heavy meals\n\n🎯 Realistic goal: 0.5-1 kg per week.',
                'belly fat': 'Spot reduction of belly fat is a myth! However, these strategies specifically reduce visceral (belly) fat:\n\n🔬 What science says:\n- Visceral fat responds well to aerobic exercise (running, cycling, brisk walking)\n- Reducing refined carbs and sugar is most effective dietary change\n- Poor sleep increases cortisol → belly fat storage\n- Stress management directly impacts belly fat\n- Strength training raises metabolism, reduces fat overall\n\n📋 Effective exercises: Planks, bicycle crunches, mountain climbers, burpees, jumping jacks, ab wheel rollouts.\n\n🍽️ Diet focus: Reduce maida, white rice, sugary drinks, alcohol. Increase fiber, protein, water. Apple cider vinegar (1 tbsp in water before meals) has some evidence for belly fat reduction.',
                'muscle gain': 'Building muscle as an Indian vegetarian is absolutely possible!\n\n🍽️ Protein targets: 1.6-2.2g per kg body weight daily. For 70kg person: 112-154g protein daily.\n\n🌱 Indian protein sources:\n- Soya chunks (50g dry = 26g protein)\n- Paneer (100g = 18g protein)\n- Dal + rice combination\n- Greek yogurt / dahi\n- Rajma, chole, moong\n- Sattu shake (30g = 9g protein)\n- Eggs (if vegetarian allows)\n\n💪 Training: Progressive overload (increase weight/reps each week), 3-5 sessions per week, compound movements (squat, deadlift, press, row), adequate rest (8hrs sleep for muscle growth).\n\n⏱️ Realistic expectation: 1-2 kg muscle per month for beginners, 0.5-1 kg for intermediate.',
                'protein foods india': 'Complete Indian protein guide!\n\n🥇 Top Indian protein foods (per 100g):\n1. Soya chunks: 52g protein (KING!)\n2. Sattu (roasted chana flour): 20g protein\n3. Paneer: 18g protein\n4. Chicken breast: 31g protein\n5. Eggs: 13g/100g\n6. Fish (Rohu/Pomfret): 16-18g protein\n7. Masoor dal: 18g/cup cooked\n8. Moong dal: 14g/cup cooked\n9. Rajma: 15g/cup cooked\n10. Greek dahi: 17g/cup\n\n💡 Smart combinations:\n- Dal + roti (complementary proteins, complete amino acid profile)\n- Curd + any meal (boosts overall protein)\n- Soya chunks in curry + roti\n- Paneer bhurji with chapati',
                'diabetes diet india': 'Managing diabetes with Indian food:\n\n✅ Best Indian foods for diabetics:\n- Karela (bitter gourd): Contains charantin, lowers blood sugar\n- Methi (fenugreek): Soluble fiber slows glucose absorption\n- Moong dal: Lowest glycemic index among dals\n- Brown rice > white rice\n- Barley (jau) roti: Best grain for blood sugar control\n- Amla: Powerful antioxidant, improves insulin sensitivity\n- Cinnamon (dalchini): Reduces fasting blood sugar\n- Oats/daliya: High fiber, slow-digesting\n\n❌ Avoid: White rice in large portions, maida items, sweets, fruit juices, deep fried food\n\n⏰ Meal timing: Eat every 3-4 hours to prevent blood sugar spikes and crashes. Never skip meals.',

                // ── WELLNESS & LIFESTYLE ──
                'sleep': 'Sleep is the most underrated health tool! Adults need 7-9 hours. Consequences of poor sleep (proven by research): 45% increased risk of obesity, 50% higher risk of heart disease, impaired memory and focus, higher cortisol (stress hormone), reduced muscle recovery, weakened immunity.\n\n😴 Better sleep tips:\n- Consistent wake time every day (even weekends!)\n- Cool room (18-20°C is optimal)\n- No screens 1 hour before bed (blue light disrupts melatonin)\n- Chamomile tea or warm milk before bed\n- Avoid caffeine after 2pm\n- Dark room (even small lights disrupt sleep)\n- Journaling to clear racing thoughts\n- Magnesium supplement can improve sleep quality',
                'stress': 'Stress management is essential for health! Chronic stress causes: Weight gain (cortisol → belly fat storage), weakened immunity, poor sleep, digestive issues, cardiovascular disease, mental health problems.\n\n🧘 Evidence-based stress busters:\n- Deep breathing (4-7-8 technique: inhale 4s, hold 7s, exhale 8s)\n- Pranayama (Anulom Vilom for 5 min)\n- Regular exercise (releases endorphins)\n- Social connection (in-person is best)\n- Time in nature (reduces cortisol 25% in 20 minutes)\n- Journaling (5 minutes daily)\n- Limiting news/social media\n- Talking to someone you trust\n\n🍽️ Anti-stress foods: Ashwagandha, dark chocolate, chamomile tea, leafy greens, fatty fish, nuts.',
                'hydration': 'Hydration guide for Indians! Daily water needs: 2.5-3.5 liters in India\'s climate (more in summer/exercise). Signs of dehydration: Dark yellow urine (should be pale), fatigue, headache, dry skin, poor concentration.\n\n💧 Hydration sources beyond water:\n- Nimbu pani (great electrolyte drink)\n- Coconut water (natural sports drink)\n- Chaas/buttermilk (hydrating + probiotic)\n- Dal/sambar (soups count!)\n- Fruits like watermelon, cucumber (90%+ water)\n- Lauki (bottle gourd) juice\n\n⏰ Best times to drink: Wake up (2 glasses), before meals (15 min before), before/during/after exercise, evening before sunset (not too late or disrupts sleep).',
                'immunity': 'Build a strong immune system naturally!\n\n🌟 Immunity-boosting foods:\n- Amla (highest Vitamin C among Indian foods)\n- Haldi (turmeric): Curcumin activates immune genes\n- Ginger: Anti-viral, anti-bacterial properties\n- Garlic: Allicin is a powerful immune booster\n- Tulsi (holy basil): Adaptogen, antimicrobial\n- Black pepper: Enhances immune response\n- Moringa (drumstick): 7x more Vitamin C than oranges\n- Citrus fruits: Standard Vitamin C source\n\n💊 Key nutrients for immunity: Vitamin D (get 20 min sunlight daily), Zinc (pumpkin seeds, chickpeas), Vitamin C, Selenium (Brazil nuts)\n\n🏃 Lifestyle: Regular moderate exercise (30 min/day), 7-9hrs sleep, stress management, good gut health (probiotics).',
                'weight gain healthy': 'Healthy weight gain for underweight individuals:\n\n🍽️ Indian foods to gain weight:\n- Banana milkshake (banana + full fat milk + dates)\n- Dry fruit ladoo (calorie-dense, nutritious)\n- Peanut butter chapati rolls\n- Egg bhurji with butter roti\n- Chicken/paneer with extra ghee\n- Avocado toast (if available)\n- Full-fat dahi with nuts\n- Mango milkshake with nuts\n\n📊 Strategy: Eat 300-500 calories above your needs, focus on protein (muscle gain), strength train 3-4x/week, eat frequently (5-6 smaller meals), don\'t fill up on vegetables alone.\n\n🎯 Realistic expectation: 0.5-1 kg per month of lean mass.',
                'cholesterol': 'Managing cholesterol with Indian lifestyle:\n\n✅ Foods that LOWER cholesterol:\n- Oats/daliya: Beta-glucan fiber\n- Beans/dal: Soluble fiber\n- Flaxseed: Omega-3s, lignans\n- Fenugreek (methi): Saponins\n- Garlic: Allicin\n- Amla: Powerful antioxidant\n- Fish (if non-vegetarian)\n\n❌ Foods that RAISE cholesterol:\n- Ghee/butter in excess\n- Maida (refined flour) products\n- Deep fried foods\n- Full-fat dairy in excess\n- Red meat frequently\n\n🏃 Exercise: 30 min cardio 5x/week can raise HDL (good cholesterol) by 5-10%. Yoga also shown to reduce LDL in studies.',
                'blood pressure': 'Managing blood pressure naturally:\n\n🥗 DASH Diet adapted for India:\n- Reduce salt (max 5g/day, 1 tsp)\n- Increase potassium: Banana, coconut water, tomato, amla\n- Magnesium: Spinach, almonds, dark chocolate\n- Calcium: Dahi, milk, paneer, ragi\n- Omega-3: Flaxseed, walnuts, fish\n\n❌ Avoid: Pickles (very high sodium), papad, packaged foods, excess salt in cooking\n\n🧘 Lifestyle: Regular exercise (lowers BP 5-8 mmHg), pranayama (especially Bhramari), reduce stress, limit alcohol, don\'t smoke, maintain healthy weight (every kg lost = 1 mmHg drop).',
                'digestion': 'Improve digestion with Indian wisdom!\n\n🌿 Digestive aids:\n- Jeera (cumin): Stimulates digestive enzymes, reduces gas\n- Hing (asafoetida): Powerful antiflatulent, add to dal tadka\n- Ajwain (carom seeds): Relieves indigestion, acidity\n- Ginger: Speeds gastric emptying\n- Fennel seeds (saunf): Traditional post-meal digestive\n- Mint (pudina): Antispasmodic for IBS\n- Triphala: Ayurvedic digestive tonic\n\n💡 Habits for good digestion:\n- Eat slowly (take 20 minutes per meal)\n- Don\'t drink large amounts of water during meals\n- Walk 10 minutes after meals\n- Fermented foods (curd, idli, dosa) daily\n- Eat fruits between meals, not with meals\n- Avoid eating when stressed',
                'hair loss': 'Fight hair loss with nutrition and lifestyle!\n\n🍽️ Key nutrients for hair health:\n- Biotin: Eggs, nuts, seeds, sweet potatoes\n- Iron: Spinach, ragi, jaggery, dates, dal (eat with Vitamin C!)\n- Zinc: Pumpkin seeds, chickpeas, dal\n- Protein: Dal, paneer, eggs, soya\n- Vitamin D: Sunlight, mushrooms, fortified foods\n- Omega-3: Flaxseed, walnuts, fish\n\n🌿 Indian remedies: Amla oil/consuming amla, bhringraj oil, coconut oil massage, onion juice (research shows 86.9% regrowth!), aloe vera on scalp, methi paste.\n\n💡 Root causes: Iron deficiency anaemia (very common in Indian women), thyroid issues, PCOS, stress, hormonal changes. If severe, see a dermatologist.',
                'skin health': 'Glow from within with these tips!\n\n🥗 Best foods for skin:\n- Amla (highest Vitamin C = collagen production)\n- Carrot (beta-carotene = natural glow)\n- Tomato (lycopene protects from UV damage)\n- Palak/spinach (antioxidants)\n- Walnuts (omega-3 for plump, hydrated skin)\n- Turmeric + milk (haldi doodh brightens skin)\n- Cucumber (hydration, reduces puffiness)\n- Green tea\n\n💡 Indian skin care habits:\n- Tumeric face mask (haldi + milk + honey)\n- Besan (chickpea flour) face scrub\n- Coconut oil for dry skin\n- Aloe vera gel for oily skin\n- Rose water as toner\n\n⚠️ Skin health is mostly inside-out: Drink 3L water daily, sleep 8hrs, reduce sugar (causes glycation).',

                // ── EXERCISE SPECIFICS ──
                'plank': 'Plank is the ultimate core exercise!\n\n💪 Muscles worked: Core (transverse abdominis), lower back, glutes, shoulders, chest – truly full body stabilization.\n\n✅ Perfect plank form:\n1. Forearms on ground, elbows under shoulders\n2. Body forms straight line from head to heels\n3. Engage core (like bracing for a punch)\n4. Don\'t let hips sag or pike up\n5. Breathe normally throughout\n\n🔢 Progression:\n- Beginner: 3x 20-30 seconds\n- Intermediate: 3x 60 seconds\n- Advanced: 3x 2-3 minutes\n\nVariations: Side plank (obliques), plank with leg raise, plank to downward dog, RKC plank (hardest variation). The world record is over 9 hours!',
                'deadlift': 'Deadlift is the king of all exercises!\n\n💪 Muscles worked: Entire posterior chain – glutes, hamstrings, lower back, traps, lats, forearms.\n\n✅ Conventional deadlift form:\n1. Bar over mid-foot, hip-width stance\n2. Hinge at hips, grip just outside legs\n3. Chest up, back flat, deep breath in\n4. Drive floor away (think leg press, not pull)\n5. Hips and shoulders rise at same rate\n6. Lock out at top: Squeeze glutes, stand tall\n\n⚠️ Most common mistakes:\n- Rounding lower back (most dangerous)\n- Bar drifting from body\n- Jerking the weight off floor\n\n🔢 Beginner: Start with 60-70% body weight, perfect form first. Build to 1.5x body weight in 6 months.',
                'cardio at home': 'Best cardio workouts at home without equipment!\n\n🏠 Effective home cardio options:\n- Jumping jacks: 200 calories/30 min\n- High knees: High intensity, excellent calorie burn\n- Burpees: Full body, highest calorie burn (~10 cal/minute!)\n- Skipping rope: 300-400 cal/30 min\n- Stair climbing (if you have stairs)\n- Dance to music: 200-400 cal/hour\n- Shadow boxing: 400 cal/hour\n- Mountain climbers: Core + cardio combined\n\n⏱️ 20-minute fat-burning routine:\n- 5 min warm-up (march in place)\n- 10 min HIIT (30 sec work, 15 sec rest)\n- 5 min cool-down\n\nDo this 4-5 days per week for visible results in 4-6 weeks.',
                'gym vs home workout': 'Home workout vs Gym – which is better?\n\n🏠 Home workout advantages:\n- Zero cost, zero commute\n- Privacy, any time\n- Bodyweight exercises incredibly effective\n- Can achieve great results with minimal equipment\n\n🏋️ Gym advantages:\n- More equipment (progressive overload easier)\n- Social environment/motivation\n- Personal training available\n- Better for serious muscle building\n\n✅ The truth: You can get fit and healthy with home workouts. Gym becomes valuable when you want to optimize muscle building or enjoy the community. Most Indian homes have floor space for: Push-ups, squats, lunges, planks, burpees, yoga – all you truly need for fitness. A resistance band set (₹800-1500) dramatically expands home workout options.',

                // ── GENERAL HEALTH ──
                'meditation': 'Meditation is brain training for health!\n\n🧠 Proven benefits: Reduces anxiety by 40-60%, shrinks amygdala (fear center) in brain, increases grey matter in prefrontal cortex, lowers blood pressure, improves focus and concentration, reduces chronic pain perception, improves sleep quality.\n\n🔰 How to start (5 minutes daily):\n1. Find quiet spot, sit comfortably\n2. Set timer for 5 minutes\n3. Focus on breath sensation\n4. When mind wanders, gently bring back (that\'s the exercise!)\n5. Don\'t judge, just observe\n\n📱 Apps: Insight Timer (free), Calm, Headspace. Progress to 20 minutes daily over 4-6 weeks. Morning is best but any time works. Even 5 min/day shows measurable brain changes in 8 weeks.',
                'posture': 'Good posture is crucial for long-term health!\n\n🪑 Ideal sitting posture:\n- Ears aligned over shoulders\n- Shoulders back and down (not hunched)\n- Back supported (lumbar support)\n- Hips at 90 degrees\n- Feet flat on floor\n- Screen at eye level\n- Elbows at 90 degrees when typing\n\n🏃 Best exercises for posture:\n- Face pulls (most important!)\n- Band pull-aparts\n- Chin tucks\n- Cat-cow stretches\n- Wall angles\n- Thoracic spine extensions over foam roller\n\n⏰ Take a posture break every 30 minutes: Stand up, roll shoulders back, do 10 chin tucks. Set a timer if needed. The best posture is always your NEXT posture – keep moving!',
                'protein': 'Protein is the most important macronutrient for body composition! Daily needs: 0.8g/kg for sedentary adults, 1.2-1.6g/kg for active people, 1.6-2.2g/kg for muscle building.\n\nBest sources for Indians:\n🥩 Non-veg: Chicken breast (31g/100g), eggs (6g each), fish (24-28g/100g)\n🌱 Vegetarian: Soya chunks (52g/100g dry!), paneer (18g/100g), Greek yogurt (17g/cup), rajma/chana (15g/cup), dal (12-18g/cup)\n\n💡 Pro tip: Dal + rice together = complete protein (all essential amino acids). This is why dal-chawal is a perfect meal scientifically!',
                'intermittent fasting': 'Intermittent Fasting (IF) for Indians!\n\n⏰ Popular protocols:\n- 16:8: Fast 16 hours, eat 8-hour window (e.g., 12pm-8pm). Most popular.\n- 5:2: Eat normally 5 days, restrict to 500 cal 2 days.\n- OMAD: One meal a day (advanced).\n\n✅ Benefits: Weight loss, improved insulin sensitivity, cellular autophagy, may increase longevity, mental clarity.\n\n🍽️ Indian IF friendly eating window: Chai at 12pm, lunch, evening snack with nuts, dinner by 8pm.\n\n⚠️ Not for: Pregnant/nursing women, diabetics (on medication), eating disorder history, those under 18. Always consult doctor. Common side effect: Headache initially (electrolyte imbalance) – have nimbu pani with salt.',
                'vitamins': 'Essential vitamins for Indians!\n\n🔆 Vitamin D (Most Indians are deficient!): Sources: 20-30 min morning sunlight, egg yolk, fatty fish, fortified milk. 70-80% of urban Indians are deficient – consider supplement after blood test.\n\n🩸 Vitamin B12 (Critical for vegetarians!): Sources: Dairy, eggs, fortified foods. Vegetarians/vegans MUST supplement. Deficiency causes: Fatigue, neurological issues, anemia.\n\n🟠 Vitamin C: Sources: Amla (best!), guava, citrus, bell peppers. Helps iron absorption from plant foods.\n\n🦷 Calcium: Sources: Ragi (highest plant calcium!), dairy, sesame seeds, amaranth. 1000mg/day for adults.\n\n🌿 Iron: Sources: Ragi, amaranth, jaggery, spinach (with Vitamin C for absorption). Common deficiency in India.',
            };

            const send = async (text = input) => {
                if (!text.trim()) return;
                setMessages(m => [...m, { text, type: 'user' }]);
                setInput('');
                setTyping(true);

                const lowerText = text.toLowerCase().trim();
                let response = null;

                // Try exact and partial key matches
                for (const [key, answer] of Object.entries(healthAnswers)) {
                    if (lowerText.includes(key) || key.includes(lowerText.replace(/[?!.,]/g,'').trim())) {
                        response = answer; break;
                    }
                }
                // Try word matching
                if (!response) {
                    const words = lowerText.split(' ').filter(w=>w.length>3);
                    for (const word of words) {
                        for (const [key, answer] of Object.entries(healthAnswers)) {
                            if (key.includes(word) || word.includes(key)) { response = answer; break; }
                        }
                        if (response) break;
                    }
                }
                if (!response) {
                    response = "Namaste! 🙏 I can help with these health topics:\n\n🍽️ Indian foods: dal, chapati, paneer, ghee, biryani, idli, sprouts, makhana, chai, sattu, rajma\n🏋️ Exercise: surya namaskar, yoga, running, push ups, squats, HIIT, plank, deadlift\n💪 Goals: weight loss india, muscle gain, belly fat, protein foods india\n🧘 Wellness: sleep, stress, meditation, hydration, immunity, digestion\n🏥 Health: diabetes diet india, cholesterol, blood pressure, hair loss, skin health, vitamins\n\nTry asking about any of these topics!";
                }

                setTimeout(() => {
                    setMessages(m => [...m, { text: response, type: 'bot' }]);
                    setTyping(false);
                }, 800);
            };

            return (
                <div className="tool-card">
                    <div className="tool-header"><div className="tool-icon">💬</div><h3 className="tool-title">Health Q&A</h3></div>
                    <div className="quick-questions">
                        {quickQs.map((q, i) => <button key={i} className="quick-btn" onClick={() => send(q)}>{q}</button>)}
                    </div>
                    <div className="chat-container">
                        <div className="chat-messages" ref={ref}>
                            {messages.map((m, i) => <div key={i} className={`chat-message ${m.type}`} style={{whiteSpace:'pre-line'}}>{m.text}</div>)}
                            {typing && <div className="typing"><span></span><span></span><span></span></div>}
                        </div>
                        <div className="input-wrapper">
                            <input type="text" className="text-input" placeholder="Ask a health question…" value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()} />
                            <button className="btn" onClick={()=>send()} disabled={!input.trim()||typing}>Send</button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
